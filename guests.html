<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest Management | AURUM Admin</title>
  <style>
    :root {
      --bg-color: #030712;
      --panel-bg: #0F172A;
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --aurum-blue: #0073FF;
      --aurum-blue-hover: #3898F8;
      --gold: #D4AF37;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-color); color: var(--text-main); line-height: 1.6;
      -webkit-font-smoothing: antialiased; display: flex; min-height: 100vh;
    }

    /* === SIDEBAR === */
    .sidebar {
      width: 260px; background: var(--panel-bg); border-right: 1px solid var(--panel-border);
      padding: 32px 24px; display: flex; flex-direction: column; position: sticky; top: 0;
    }
    .logo { font-weight: 900; font-size: 1.25rem; margin-bottom: 48px; display: flex; align-items: center; gap: 8px; }
    .logo span { color: var(--aurum-blue); }
    .nav-item {
      padding: 12px 16px; border-radius: 12px; color: var(--text-muted); text-decoration: none;
      font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
    }
    .nav-item:hover, .nav-item.active { background: rgba(0, 115, 255, 0.1); color: var(--text-main); }
    .nav-item.active { border: 1px solid rgba(0, 115, 255, 0.2); }

    /* === MAIN CONTENT === */
    .main { flex: 1; padding: 40px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
    .header h1 { font-size: 2rem; font-weight: 900; letter-spacing: -0.02em; }
    
    /* === MEMBER TABLE === */
    .table-panel { 
      background: var(--panel-bg); border-radius: var(--radius); 
      border: 1px solid var(--panel-border); overflow-x: auto; 
    }
    .table-header { padding: 24px; border-bottom: 1px solid var(--panel-border); display: flex; justify-content: space-between; align-items: center; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th { text-align: left; padding: 16px 24px; background: rgba(255,255,255,0.02); color: var(--text-muted); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--panel-border); }
    td { padding: 16px 24px; border-bottom: 1px solid var(--panel-border); font-size: 0.95rem; }
    
    .status-badge {
      display: inline-block; padding: 4px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
    }
    .status-guest { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--panel-border); }

    .action-btn {
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--panel-border);
      background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; font-weight: 700;
      margin-right: 8px; transition: all 0.2s;
    }
    .btn-activate { color: var(--success); border-color: rgba(34, 197, 94, 0.3); }
    .btn-activate:hover { background: var(--success); color: #fff; }
    .btn-trial { color: var(--aurum-blue); border-color: rgba(0, 115, 255, 0.3); }
    .btn-trial:hover { background: var(--aurum-blue); color: #fff; }
    .btn-delete { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }
    .btn-delete:hover { background: var(--danger); color: #fff; }

    .node-pill {
      font-family: monospace; font-size: 0.85rem; background: rgba(0, 245, 255, 0.05); 
      color: #00F5FF; padding: 4px 10px; border-radius: 6px; font-weight: 900;
      letter-spacing: 0.05em; border: 1px solid rgba(0, 245, 255, 0.1);
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">AURUM<span>ADMIN</span></div>
    <nav>
      <a href="admin.html" class="nav-item">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        Dashboard
      </a>
      <a href="members.html" class="nav-item">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Members & Billing
      </a>
      <a href="guests.html" class="nav-item active">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
        Guest Rotator Roster
      </a>
      <a href="organizations.html" class="nav-item">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        Organizations
      </a>
    </nav>
  </aside>

  <main class="main">
    <header class="header">
      <div>
        <h1>Guest Management</h1>
        <p style="color: var(--text-muted);">Manage rotator participants and their Node IDs.</p>
      </div>
      <div style="background: rgba(255,255,255,0.03); padding: 12px 24px; border-radius: 12px; border: 1px solid var(--panel-border);">
        <span class="stat-label" style="font-size: 0.7rem; display: block; margin-bottom: 4px;">Total Guests</span>
        <span id="total-guests" style="font-size: 1.5rem; font-weight: 900; color: var(--gold);">0</span>
      </div>
    </header>

    <div class="table-panel">
      <div class="table-header">
        <h3 style="font-size: 1.1rem; font-weight: 800;">Pending Rotator Participants</h3>
        <input type="text" id="search-input" placeholder="Search guests..." style="background:var(--bg-color); border:1px solid var(--panel-border); color:#fff; padding:8px 16px; border-radius:8px; font-size:0.85rem; width: 250px;">
      </div>
      <table>
        <thead>
          <tr>
            <th>Guest Name</th>
            <th>Node ID</th>
            <th>Email</th>
            <th>Sponsor</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="guest-body">
          <!-- Dynamically populated -->
        </tbody>
      </table>
    </div>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="admin-gate.js"></script>
  <script>
    async function activateGuest(email, name, newStatus) {
      if (!confirm(`Upgrade ${name} to ${newStatus.toUpperCase()} node?`)) return;
      
      try {
        // 1. Update Members
        await window.aurumDB.from('aurum_members').update({ status: newStatus }).eq('email', email);
        
        // 2. Update Affiliates
        await window.aurumDB.from('aurum_affiliates').update({ status: newStatus }).eq('email', email);

        alert(`Success! ${name} is now ${newStatus}.`);
        loadGuests();
      } catch (err) { alert(err.message); }
    }

    async function deleteGuest(email) {
      if (!confirm(`Permanently delete guest ${email}?`)) return;

      try {
        await window.aurumDB.from('aurum_members').delete().eq('email', email);
        await window.aurumDB.from('aurum_affiliates').delete().eq('email', email);
        loadGuests();
      } catch (err) { alert(err.message); }
    }

    async function loadGuests() {
      if (!window.aurumDB) return setTimeout(loadGuests, 500);

      try {
        // Fetch all guests
        const { data: members, error } = await window.aurumDB
          .from('aurum_members')
          .select('*')
          .eq('status', 'guest')
          .order('membership_start', { ascending: false });

        if (error) throw error;

        // Fetch affiliate codes for these emails
        const emails = members.map(m => m.email);
        const { data: affiliates } = await window.aurumDB
          .from('aurum_affiliates')
          .select('email, affiliate_code')
          .in('email', emails);

        const affMap = {};
        if (affiliates) {
          affiliates.forEach(a => affMap[a.email] = a.affiliate_code);
        }

        const tbody = document.getElementById('guest-body');
        tbody.innerHTML = '';
        document.getElementById('total-guests').innerText = members.length;

        members.forEach(guest => {
          const nodeID = affMap[guest.email] || '—';
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><div style="font-weight:800;">${guest.full_name}</div></td>
            <td><span class="node-pill">${nodeID}</span></td>
            <td><span style="color:var(--text-muted); font-size:0.85rem;">${guest.email}</span></td>
            <td><span style="font-family:monospace; background:rgba(255,255,255,0.05); padding:4px 8px; border-radius:4px; font-size:0.8rem;">${guest.referred_by || 'DIRECT'}</span></td>
            <td><span style="color:var(--text-muted); font-size:0.8rem;">${new Date(guest.membership_start).toLocaleDateString()}</span></td>
            <td>
              <button class="action-btn btn-activate" onclick="activateGuest('${guest.email}', '${guest.full_name}', 'active')">VIP</button>
              <button class="action-btn btn-trial" onclick="activateGuest('${guest.email}', '${guest.full_name}', 'trialing')">Trial</button>
              <button class="action-btn btn-delete" onclick="deleteGuest('${guest.email}')">Delete</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) { console.error('Load guests failed:', err); }
    }

    document.addEventListener('DOMContentLoaded', loadGuests);
  </script>
</body>
</html>
