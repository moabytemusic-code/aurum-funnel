<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURUM | Crypto Beginners Portal</title>
  <style>
    :root {
      --bg-color: #EEEEEE;
      --bg-gradient: radial-gradient(circle at top, #FFFFFF 0%, #EEEEEE 100%);
      --text-main: #03030C;
      --text-muted: #444967;
      --aurum-blue: #0073FF;
      --aurum-blue-hover: #3898F8;
      --gold-accent: #D4AF37;
      --glass-bg: rgba(255,255,255,0.7);
      --glass-border: rgba(0,0,0,0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0,0,0,0.06);
      --accent-grad: linear-gradient(135deg, var(--aurum-blue), var(--aurum-blue-hover));
      --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color) var(--bg-gradient);
      color: var(--text-main); line-height: 1.6;
      -webkit-font-smoothing: antialiased; overflow: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rotator-container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(0,115,255,0.1);
      border-top: 4px solid var(--aurum-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 30px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--text-main);
    }

    p {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .redirect-text {
      font-size: 0.95rem;
      color: var(--aurum-blue);
      font-weight: 600;
    }

    .manual-link {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--glass-border);
    }

    .manual-link a {
      color: var(--aurum-blue);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .manual-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="rotator-container">
    <div class="spinner"></div>
    <h1>Finding Your Perfect Match…</h1>
    <p>We're connecting you with the best crypto beginner resource.</p>
    <p class="redirect-text">Redirecting in <span id="countdown">3</span> seconds…</p>

    <div class="manual-link">
      <p>Not redirected? <a href="#" id="manual-redirect">Click here</a></p>
    </div>
  </div>

  <script>
    // ROTATOR CONFIGURATION
    // Add your landing pages here - the rotator will cycle through them
    const ROTATOR_PAGES = [
      'crypto-beginners.html',
      'index.html',
      'welcome.html'
    ];

    // Get or initialize rotation index
    function getRotationIndex() {
      let idx = sessionStorage.getItem('aurum_rotator_idx');
      return idx ? parseInt(idx) : 0;
    }

    function setRotationIndex(idx) {
      sessionStorage.setItem('aurum_rotator_idx', idx.toString());
    }

    // Get the next page in rotation
    function getNextPage() {
      let idx = getRotationIndex();
      const page = ROTATOR_PAGES[idx % ROTATOR_PAGES.length];
      setRotationIndex((idx + 1) % ROTATOR_PAGES.length);
      return page;
    }

    // Preserve URL parameters (like ref, tracking IDs, etc.)
    function buildRedirectUrl(page) {
      const baseUrl = window.location.origin + window.location.pathname;
      const dir = baseUrl.substring(0, baseUrl.lastIndexOf('/') + 1);
      let url = dir + page;
      
      // Preserve existing query parameters
      const queryParams = window.location.search;
      if (queryParams) {
        url += queryParams;
      }
      
      return url;
    }

    // Countdown and redirect
    let count = 3;
    const countdownEl = document.getElementById('countdown');
    const manualLink = document.getElementById('manual-redirect');
    
    const targetPage = getNextPage();
    const redirectUrl = buildRedirectUrl(targetPage);
    
    manualLink.href = redirectUrl;

    const interval = setInterval(() => {
      count--;
      if (countdownEl) countdownEl.textContent = count;
      
      if (count <= 0) {
        clearInterval(interval);
        window.location.href = redirectUrl;
      }
    }, 1000);

    // Log the rotation for tracking
    console.log(`[ROTATOR] Redirecting to: ${targetPage}`);
  </script>

</body>
</html>
